services:
  db:
    image: pgvector/pgvector:pg18
    container_name: inscribing_database
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - inscribing_network

volumes:
  db_data:

networks:
  inscribing_network:
    driver: bridge
